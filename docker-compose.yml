services:
  aegisroute:
    build: .
    container_name: aegisroute_app
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./data:/app/data          # DB + uploads (kalıcı veri)
      - ./src:/app/src            # Kaynak dosyalar (canlı güncelleme)
      - ./docs:/app/docs          # Yardım kılavuzu (KULLANIM.md)
    environment:
      - AEGIS_DB_PATH=/app/data/aegis.db
      - AEGIS_UPLOAD_DIR=/app/data/uploads
      - LISTEN_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.portainer.name=AegisRoute"
      - "com.portainer.description=İnteraktif Rota ve Gezi Planlayıcı"
      - "traefik.enable=false"
